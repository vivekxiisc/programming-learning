<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>V-Chat Private</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2 id="room-name">V-Chat Room</h2>
            <a href="/login.html" style="color: white; text-decoration: none;">Exit</a>
        </header>
        <main id="chat-messages"></main>
        <div id="typing-status"></div>
        <form id="chat-form" class="chat-form-container">
            <input id="msg" type="text" placeholder="Type a message..." required autocomplete="off">
            <button type="submit" class="btn-send">➤</button>
        </form>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
