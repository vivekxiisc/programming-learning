<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Chat | Private Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #4a4a4a; margin-bottom: 1.5rem; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { width: 95%; padding: 12px; background: #764ba2; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #667eea; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>V-Chat 🔒</h1>
        <form action="chat.html" method="GET">
            <input type="text" name="username" placeholder="Your Name" required>
            <input type="text" name="room" placeholder="Enter Room ID (e.g. Secret123)" required>
            <button type="submit">Join Private Room</button>
        </form>
    </div>
</body>
</html>
