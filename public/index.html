<!DOCTYPE html>
<html>
<head>
    <title>V-Chat | Register</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 350px; text-align: center; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { width: 95%; padding: 12px; background: #764ba2; color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #667eea; }
    </style>
</head>
<body>
    <div class="card">
        <h1>V-Chat Register</h1>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Choose Username" required>
            <input type="password" name="password" placeholder="Choose Password" required>
            <button type="submit">Create Account</button>
        </form>
        <p>Already a member? <a href="login.html">Login</a></p>
    </div>
</body>
</html>
