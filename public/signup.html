<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>V-Chat | Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: linear-gradient(to bottom, #dec4fc, #913ffc); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: white;">
    <div style="background: rgba(0,0,0,0.4); padding: 40px; border-radius: 20px; text-align: center; width: 320px;">
        <h2>Create Account</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Choose Username" required style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box;">
            <input type="password" name="password" placeholder="Choose Password" required style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box;">
            <button type="submit" style="width: 100%; padding: 12px; background: #fff; color: #913ffc; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Register</button>
        </form>
        <p style="margin-top: 20px;"><a href="/" style="color: #fff;">Back to Login</a></p>
    </div>
</body>
</html>
