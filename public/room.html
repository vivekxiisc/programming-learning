<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Private Room - V-Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .room-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .room-card:hover {
            transform: translateY(-5px);
        }

        .room-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: inline-block;
            background: #e7f3f0;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            color: #075e54;
        }

        .room-card h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .room-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .input-group input:focus {
            border-color: #075e54;
        }

        .btn-join {
            width: 100%;
            padding: 15px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 4px 15px rgba(7, 94, 84, 0.3);
        }

        .btn-join:hover {
            background: #128c7e;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="room-card">
        <div class="room-icon">🔐</div>
        <h2>Private Chat</h2>
        <p>Enter a <b>Room ID</b> to start a secure conversation. Your friend must enter the same ID.</p>
        
        <form action="/chat.html" method="GET">
            <div class="input-group">
                <input type="text" name="room" placeholder="Enter Room Name..." required autocomplete="off">
            </div>
            <button type="submit" class="btn-join">Start Chatting</button>
        </form>

        <div class="footer-text">
            End-to-end encrypted feel by V-Chat
        </div>
    </div>

</body>
</html>
