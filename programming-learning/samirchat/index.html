<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Doctor Chat - Voice Enabled</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #e5ddd5; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
    .chat-container { width: 100%; max-width: 500px; height: 95vh; background: #fff; display: flex; flex-direction: column; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); }
    .chat-header { background: #075e54; color: white; padding: 15px; display: flex; align-items: center; gap: 12px; }
    .chat-body { flex: 1; padding: 15px; overflow-y: auto; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; scroll-behavior: smooth; display: flex; flex-direction: column; }
    .message { max-width: 85%; margin-bottom: 15px; padding: 12px; border-radius: 8px; position: relative; word-wrap: break-word; animation: fadeIn 0.3s ease; line-height: 1.5; font-size: 14.5px; }
    .received { background: white; align-self: flex-start; border-top-left-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .med-box { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ccc; color: #d32f2f; font-weight: 600; }
    .advice-box { color: #128c7e; font-style: italic; margin-top: 5px; }
    .chat-footer { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #ddd; }
    #messageInput { flex: 1; border: none; border-radius: 25px; padding: 12px 18px; outline: none; font-size: 15px; background: white; resize: none; }
    .btn { border: none; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: white; }
    #sendButton { background: #075e54; }
    #voiceButton { background: #128c7e; }
    .recording { background: #ff3b30 !important; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .typing-indicator { display: none; background: white; padding: 10px; border-radius: 8px; width: fit-content; margin-bottom: 15px; }
    .dot { display: inline-block; width: 7px; height: 7px; background: #bbb; border-radius: 50%; margin-right: 3px; animation: bounce 1.3s infinite; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <img src="https://www.image2url.com/r2/default/images/1777972423178-2ad3585c-437c-4bea-a754-65a8139b8c37.avif" style="width:40px;height:40px;border-radius:50%; object-fit: cover;">
      <div>
        <div style="font-weight:600">AI Doctor🩺</div>
        <div style="font-size:12px; opacity: 0.9;">Online | Voice Enabled</div>
      </div>
    </div>
    
    <div class="chat-body" id="chatBody">
      <div class="typing-indicator" id="typingIndicator">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>
    
    <div class="chat-footer">
      <button id="voiceButton" class="btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <textarea id="messageInput" placeholder="Bolien ya likhein..." rows="1"></textarea>
      <button id="sendButton" class="btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
      </button>
    </div>
  </div>

  <script>
    const chatBody = document.getElementById('chatBody');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const voiceButton = document.getElementById('voiceButton');
    const typingIndicator = document.getElementById('typingIndicator');

    const medicalDB = {
      "fever": { med: "Paracetamol (Dolo 650)", advice: "Thande paani ki patti rakhein aur aaram karein." },
      "cold": { med: "Cetrizen ya Okacet", advice: "Garam paani piyein aur steam lein." },
      "cough": { med: "Ascoril ya Benadryl Syrup", advice: "Namak ke paani se gargle karein." },
      "headache": { med: "Saridon ya Crocin", advice: "Andhere kamre me aaram karein aur phone kam chalayein." },
      "stomach pain": { med: "Meftal-Spas ya Cyclopam", advice: "Halka khana jaise khichdi khayein." },
      "acidity": { med: "Digene Gel ya Pantop-40", advice: "Masaledar khana band karein aur thanda doodh piyein." },
      "loose motion": { med: "Loperamide ya Sporlac", advice: "ORS ka ghol baar-baar piyein." },
      "vomiting": { med: "Ondem (Ondansetron)", advice: "Ek saath zyada paani na piyein, thoda-thoda karke lein." },
      "back pain": { med: "Zerodol-P ya Volini Gel", advice: "Zameen par seedhe letne ki koshish karein." },
      "sore throat": { med: "Strepsils ya Copsils", advice: "Adrak aur honey (shahad) ka sevan karein." },
      "constipation": { med: "Dulcolax ya Cremaffin", advice: "Raat ko garam paani ke saath fiber wala khana lein." },
      "itching": { med: "Allegra 120mg", advice: "Neem ke paani se nahaayein aur cotton kapde pehnein." },
      "body pain": { med: "Combiflam ya Brufen", advice: "Garam paani se nahaane se aaram milega." },
      "toothache": { med: "Ketorol-DT", advice: "Laung (clove) ka tel dard wali jagah lagayein." },
      "eye irritation": { med: "Itone ya Refresh Tears", advice: "Aankhon ko thande paani se dhoyein, ragdein nahi." }
    };

    function speak(text) {
      const synth = window.speechSynthesis;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'hi-IN';
      synth.speak(utterance);
    }

    function addMessage(text, type = 'received', isHTML = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;
      if(isHTML) msgDiv.innerHTML = text;
      else msgDiv.textContent = text;
      chatBody.insertBefore(msgDiv, typingIndicator);
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function generateResponse(userMsg) {
      typingIndicator.style.display = 'block';
      chatBody.scrollTop = chatBody.scrollHeight;

      setTimeout(() => {
        typingIndicator.style.display = 'none';
        const msg = userMsg.toLowerCase();
        let found = false;

        for (let symptom in medicalDB) {
          if (msg.includes(symptom)) {
            const data = medicalDB[symptom];
            const htmlResponse = `
              <strong>Diagnosis:</strong> Possible ${symptom.toUpperCase()}<br>
              <div class="advice-box">💡 Advice: ${data.advice}</div>
              <div class="med-box">💊 Suggested Medicine: ${data.med}</div>
            `;
            const voiceText = `Aapko ${symptom} ho sakta hai. Salah ye hai ki ${data.advice}. Aap ${data.med} le sakte hain.`;
            addMessage(htmlResponse, 'received', true);
            speak(voiceText);
            found = true;
            break;
          }
        }

        if (!found) {
          let reply = "Maafi chahta hoon, mujhe iske baare me jankari nahi hai. Kripya doctor se milein.";
          if (msg.includes("hi") || msg.includes("hello")) reply = "Namaste! Main aapka AI Doctor hoon. Apne symptoms batayein.";
          addMessage(reply, 'received');
          speak(reply);
        }
      }, 1000);
    }

    // Voice Recognition Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'hi-IN';

      voiceButton.addEventListener('click', () => {
        recognition.start();
        voiceButton.classList.add('recording');
      });

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        messageInput.value = transcript;
        voiceButton.classList.remove('recording');
        sendButton.click();
      };

      recognition.onerror = () => voiceButton.classList.remove('recording');
      recognition.onspeechend = () => recognition.stop();
    }

    sendButton.addEventListener('click', () => {
      const val = messageInput.value.trim();
      if(val) {
        addMessage(val, 'sent');
        messageInput.value = '';
        generateResponse(val);
      }
    });

    messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendButton.click(); });
    
    window.onload = () => {
      setTimeout(() => {
        const welcome = "Hello! Main aapka AI Doctor hoon. Aap bol kar ya likh kar apni pareshani bata sakte hain.";
        addMessage(welcome);
        speak(welcome);
      }, 500);
    };
  </script>
</body>
</html>
